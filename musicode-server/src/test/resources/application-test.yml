spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  h2:
    console:
      enabled: false

musicode:
  jwt:
    secret: test-secret-key-must-be-at-least-32-bytes-long-for-hs256
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  cookies:
    secure: false
  encryption:
    token-key: test-encryption-key-for-unit-and-integration-tests-only

# Suppress logging noise in tests
logging:
  level:
    com.musicode: WARN
    org.hibernate.SQL: WARN
