<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musicode — Test Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #222;
        }
        header h1 { font-size: 1.5rem; font-weight: 600; color: #fff; }
        header p { font-size: 0.85rem; color: #888; margin-top: 0.25rem; }
        #status {
            padding: 0.75rem 2rem;
            font-size: 0.85rem;
            color: #888;
            border-bottom: 1px solid #1a1a1a;
        }
        #track-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }
        .track {
            display: flex;
            align-items: center;
            padding: 0.75rem 2rem;
            cursor: pointer;
            transition: background 0.15s;
            gap: 1rem;
        }
        .track:hover { background: #1a1a1a; }
        .track.playing { background: #1a1a2e; }
        .track-num {
            width: 2rem;
            text-align: right;
            color: #555;
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
        }
        .track-info { flex: 1; min-width: 0; }
        .track-title {
            font-size: 0.95rem;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track.playing .track-title { color: #7c8aff; }
        .track-meta {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.15rem;
        }
        .track-duration {
            color: #555;
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
        }
        #player-bar {
            border-top: 1px solid #222;
            padding: 1rem 2rem;
            background: #111;
            display: none;
        }
        #player-bar.active { display: block; }
        #now-playing {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 0.5rem;
        }
        #now-playing span { color: #7c8aff; }
        audio {
            width: 100%;
            height: 40px;
            outline: none;
        }
        #error-msg {
            padding: 1rem 2rem;
            color: #ff5555;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎵 Musicode Test</h1>
        <p>End-to-end playback proof — scan, browse, stream, seek</p>
    </header>
    <div id="status">Loading tracks…</div>
    <div id="error-msg"></div>
    <div id="track-list"></div>
    <div id="player-bar">
        <div id="now-playing">Now playing: <span id="np-title">—</span></div>
        <audio id="audio-player" controls preload="metadata"></audio>
    </div>

    <script>
        const trackList = document.getElementById('track-list');
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error-msg');
        const playerBar = document.getElementById('player-bar');
        const audioPlayer = document.getElementById('audio-player');
        const npTitle = document.getElementById('np-title');
        let currentTrackId = null;

        function formatDuration(seconds) {
            if (!seconds) return '—';
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }

        function playTrack(track) {
            // Update highlight
            document.querySelectorAll('.track.playing').forEach(el => el.classList.remove('playing'));
            const el = document.querySelector(`[data-track-id="${track.id}"]`);
            if (el) el.classList.add('playing');

            // Set audio source and play
            currentTrackId = track.id;
            audioPlayer.src = `/api/stream/${track.id}`;
            audioPlayer.load();
            audioPlayer.play().catch(err => {
                console.error('Playback error:', err);
                showError(`Playback error: ${err.message}`);
            });

            // Update now playing
            const artist = track.artist ? track.artist.name : 'Unknown';
            npTitle.textContent = `${track.title} — ${artist}`;
            playerBar.classList.add('active');
        }

        async function loadTracks() {
            try {
                const res = await fetch('/api/tracks');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const tracks = await res.json();

                if (tracks.length === 0) {
                    statusEl.textContent = 'No tracks found. Scan a folder first: POST /api/library/scan';
                    return;
                }

                statusEl.textContent = `${tracks.length} tracks loaded`;

                trackList.innerHTML = tracks.map(t => `
                    <div class="track" data-track-id="${t.id}" onclick='playTrack(${JSON.stringify(t).replace(/'/g, "\\'")})'> 
                        <span class="track-num">${t.trackNumber || '—'}</span>
                        <div class="track-info">
                            <div class="track-title">${t.title}</div>
                            <div class="track-meta">${t.artist ? t.artist.name : 'Unknown'} · ${t.album ? t.album.title : 'Unknown Album'}</div>
                        </div>
                        <span class="track-duration">${formatDuration(t.duration)}</span>
                    </div>
                `).join('');
            } catch (err) {
                statusEl.textContent = 'Failed to load tracks';
                showError(`Error: ${err.message}`);
            }
        }

        // Handle playback errors
        audioPlayer.addEventListener('error', () => {
            const err = audioPlayer.error;
            showError(`Audio error (code ${err ? err.code : '?'}): ${err ? err.message : 'unknown'}`);
        });

        loadTracks();
    </script>
</body>
</html>
