spring:
  application:
    name: musicode-server

  datasource:
    url: jdbc:h2:file:./data/musicode-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

musicode:
  admin:
    default-password: changeme

logging:
  level:
    com.musicode: DEBUG
    org.hibernate.SQL: WARN
