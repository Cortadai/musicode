services:
  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      musicode-server:
        condition: service_healthy

  musicode-server:
    build: ./musicode-server
    expose:
      - "8080"
    volumes:
      - ./musicode-server/data:/app/data
      - ${MUSIC_DIR:-C:/Users/david/Music}:/music:ro
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MUSICODE_COVERS_DIR=/app/data/covers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
