name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21 + Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: musicode-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - run: mvn -B verify

  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: musicode-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: musicode-ui/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest --run
      - run: npm run build
